name: link-check

on:
  push:
    branches: [master]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "demo_assets/**/*.md"
      - ".github/workflows/link-check.yml"
  pull_request:
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "demo_assets/**/*.md"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "0 12 * * 1"  # weekly Monday noon UTC

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link check (README + docs)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,203,206,429
            README.md
            docs/**/*.md
            demo_assets/**/*.md
          fail: true
          jobSummary: true
