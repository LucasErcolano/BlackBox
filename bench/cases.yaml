version: 1
cases:
  - key: sanfer_tunnel
    tier: 1
    platform: ground_vehicle
    bag_duration_s: 3626.8
    operator_narrative: "Tunnel entry caused GNSS/RTK anomaly and behavior degradation."
    ground_truth:
      root_cause: sensor_timeout
      summary: >
        Dual-antenna moving-base RTK never produces carrier-phase solution —
        rover receiver never ingests MB observation stream (UBX-RXM-RAWX/SFRBX
        or RTCM3 4072.0/4072.1 + 1077/1087/1097/1127). Session-wide,
        43 min pre-tunnel. Tunnel caused mild GNSS deg (num_sv 29->16) but
        not RTK failure. DBW never engaged — no autonomy to degrade.
      refutes_operator: true
    fixtures:
      stream_events: fixtures/sanfer_tunnel/stream_events.jsonl
      analysis:      fixtures/sanfer_tunnel/analysis.json

  - key: boat_lidar
    tier: 2
    platform: usv
    bag_duration_s: 416.76
    operator_narrative: "Clean run — mine for scenarios of interest."
    ground_truth:
      root_cause: other
      summary: >
        /lidar_imu declared with QoS but msg_count=0 over full 416.76 s.
        LIDAR-only platform (no GPS/encoder/camera) → IMU silence removes
        only inertial reference on open water.
    fixtures:
      stream_events: fixtures/boat_lidar/stream_events.jsonl
      analysis:      fixtures/boat_lidar/analysis.json

  - key: car_1
